spring.application.name=SpringBoot_Projeto04_Crud

# 1. Conexão com o Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/Crud_Java?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# 2. Configurações do Hibernate (JPA)
# 'update' faz o Spring criar ou atualizar as tabelas sozinho baseando-se nas suas classes Java
spring.jpa.hibernate.ddl-auto=update

# Mostra as queries SQL no console (ajuda muito a aprender o que o Spring está fazendo por baixo dos panos)
spring.jpa.show-sql=true

# Formata o SQL no console para ficar legível
spring.jpa.properties.hibernate.format_sql=true

# 3. Dialeto do MySQL (opcional nas versões novas, mas bom ter para evitar erros)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect