spring.application.name=SpringBoot_Projeto05_GerenciadorTarefas

# 1. ConexÒo com o Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/db_gerenciador_tarefas?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# 2. Configuraþ§es do Hibernate (JPA)
# 'update' faz o Spring criar ou atualizar as tabelas sozinho baseando-se nas suas classes Java
spring.jpa.hibernate.ddl-auto=update

# O Spring mostra os comandos SQL no console do IntelliJ
spring.jpa.show-sql=true

# Organiza o SQL no console para facilitar a leitura humana
spring.jpa.properties.hibernate.format_sql=true

# 3. Dialeto do MySQL
# O Spring ajusta o "idioma" para falar corretamente com o MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect