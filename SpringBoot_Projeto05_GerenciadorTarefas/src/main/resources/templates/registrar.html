<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Gerenciador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-gradient" style="background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh;">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg border-0" style="width: 400px;">

        <div class="text-center mb-4">
            <div class="display-6 fw-bold text-primary">Gerenciador</div>
            <p class="text-muted">Crie sua conta pessoal</p>
        </div>

        <form th:action="@{/registrar}" th:object="${usuario}" method="post">

            <div class="mb-3">
                <label class="form-label fw-semibold"><i class="bi bi-person-fill"></i> Nome de Usuário</label>
                <input type="text" th:field="*{nome}" class="form-control form-control-lg fs-6"
                       placeholder="Ex: João Silva" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold"><i class="bi bi-lock-fill"></i> Senha</label>
                <input type="password" th:field="*{senha}" class="form-control form-control-lg fs-6"
                       placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 mt-2 fw-bold">
                Criar Conta Gratis
            </button>
        </form>

        <div class="text-center mt-4">
            <span class="text-muted small">Já possui uma conta?</span>
            <a href="/login" class="text-decoration-none fw-bold ms-1">Entrar</a>
        </div>
    </div>
</div>

</body>
</html>
