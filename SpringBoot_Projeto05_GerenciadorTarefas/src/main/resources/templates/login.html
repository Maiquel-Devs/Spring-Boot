<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Gerenciador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet"
</head>
<body class="bg-gradient" style="background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh;">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg border-0" style="width: 400px;">

        <div class="text-center mb-4">
            <div class="display-6 fw-bold text-primary">Bem-vindo</div>
            <p class="text-muted">Acesse suas tarefas</p>
        </div>

        <div th:if="${erro}" class="alert alert-danger p-2 small text-center" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${erro}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuário</label>
                <input type="text" name="nome" class="form-control" placeholder="Seu nome" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="Sua senha" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold">Entrar</button>
        </form>

        <div class="text-center mt-4 text-muted small">
            Novo por aqui? <a href="/registrar" class="text-decoration-none fw-bold">Crie uma conta</a>
        </div>
    </div>
</div>

</body>
</html>
