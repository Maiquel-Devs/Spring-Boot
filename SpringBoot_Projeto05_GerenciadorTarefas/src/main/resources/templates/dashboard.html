<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minhas Tarefas - Gerenciador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-check2-square"></i> GerenciadorTarefas</a>
        <div class="d-flex align-items-center">
            <span class="text-white me-3">Olá, <strong th:text="${usuario.nome}"></strong>!</span>
            <a href="/login" class="btn btn-light btn-sm fw-bold text-primary">Sair</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card card-custom p-4 mb-4 shadow-sm border-0">
                <h5 class="fw-bold mb-3 text-primary">Nova Tarefa</h5>
                <form th:action="@{/tarefas/salvar}" method="post" class="row g-2">
                    <input type="hidden" name="usuarioId" th:value="${usuario.id}">

                    <div class="col-md-10">
                        <input type="text" name="descricao" class="form-control form-control-lg fs-6"
                               placeholder="O que você precisa fazer hoje?" required autofocus>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100 h-100 fw-bold">Add</button>
                    </div>
                </form>
            </div>

            <div class="card card-custom p-4 shadow-sm border-0">
                <h5 class="fw-bold mb-4">Minhas Atividades</h5>

                <div th:if="${#lists.isEmpty(listaTarefas)}" class="text-center text-muted py-4">
                    <i class="bi bi-emoji-smile d-block display-4 mb-2"></i>
                    <p>Tudo limpo por aqui! Nenhuma tarefa pendente.</p>
                </div>

                <ul class="list-group list-group-flush">
                    <li th:each="t : ${listaTarefas}" class="list-group-item d-flex justify-content-between align-items-center px-0 py-3">
                        <span class="fs-5" th:text="${t.descricao}"></span>

                        <form th:action="@{/tarefas/excluir}" method="post">
                            <input type="hidden" name="tarefaId" th:value="${t.id}">
                            <input type="hidden" name="usuarioId" th:value="${usuario.id}">
                            <button type="submit" class="btn btn-outline-danger btn-sm border-0">
                                <i class="bi bi-trash3-fill"></i>
                            </button>
                        </form>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</div>

</body>
</html>
</html>
